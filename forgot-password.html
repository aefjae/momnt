<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password — Mixmomnt</title>
  <meta name="description" content="Request a password reset link for your Mixmomnt account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 32px;
    }
    .auth-heading {
      margin-bottom: 8px;
      font-size: 1.65rem;
    }
    .auth-sub {
      color: var(--text-2);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .back-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-2);
    }
    .back-link a { color: var(--amber); font-weight: 600; }
    .back-link a:hover { color: var(--amber-h); }
    /* Reserve error space to prevent layout shift */
    .form-error { min-height: 1em; }
    .form-global-error {
      font-size: 0.85rem;
      color: var(--error);
      min-height: 1.2em;
      margin-bottom: 12px;
      display: none;
    }
    .form-global-error.show { display: block; }
    .success-msg {
      display: none;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      line-height: 1.6;
    }
    .success-msg.show { display: block; }
    .success-icon { font-size: 2rem; margin-bottom: 12px; }
  </style>
</head>
<body class="page-loading">

  <nav class="app-nav">
    <a href="/" class="nav-logo">mix<em>momnt</em></a>
  </nav>

  <main class="auth-wrap">
    <div class="form-card">
      <h1 class="auth-heading">Forgot your password?</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

      <div id="global-error" class="form-global-error" role="alert"></div>

      <form id="forgot-form" novalidate>
        <div class="form-field">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <span class="form-error" id="email-error" role="alert"></span>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          Send reset link
        </button>
      </form>

      <div id="success-msg" class="success-msg" role="status">
        <div class="success-icon">&#9993;</div>
        <p><strong>Check your inbox.</strong></p>
        <p style="margin-top: 8px; color: var(--text-2); font-size: 0.9rem;">
          If this email is registered, you'll receive a reset link shortly.
        </p>
      </div>

      <p class="back-link">
        <a href="/login.html">Back to log in</a>
      </p>
    </div>
  </main>

  <script type="module" src="/js/forgot-password.js"></script>
</body>
</html>
