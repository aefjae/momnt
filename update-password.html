<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password — Mixmomnt</title>
  <meta name="description" content="Set a new password for your Mixmomnt account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 32px;
    }
    .auth-heading {
      margin-bottom: 28px;
      font-size: 1.65rem;
    }
    /* Reserve error space to prevent layout shift */
    .form-error { min-height: 1em; }
    .form-global-error {
      font-size: 0.85rem;
      color: var(--error);
      min-height: 1.2em;
      margin-bottom: 12px;
      display: none;
    }
    .form-global-error.show { display: block; }
    /* Loading / waiting state */
    .waiting-state {
      text-align: center;
      padding: 12px 0;
    }
    .waiting-state .spinner {
      margin: 0 auto 16px;
      display: block;
    }
    .waiting-state p {
      color: var(--text-2);
      font-size: 0.9rem;
    }
    /* Invalid/expired link state */
    .expired-state {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .expired-state.show { display: block; }
    .expired-state p { color: var(--text-2); font-size: 0.9rem; }
    .expired-state a { color: var(--amber); font-weight: 600; }
    .expired-state a:hover { color: var(--amber-h); }
    /* Success state */
    .success-msg {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .success-msg.show { display: block; }
    .success-icon { font-size: 2rem; margin-bottom: 12px; }
    /* Password form hidden until PASSWORD_RECOVERY fires */
    #update-form { display: none; }
    #update-form.show { display: block; }
  </style>
</head>
<body class="page-loading">

  <nav class="app-nav">
    <a href="/" class="nav-logo">mix<em>momnt</em></a>
  </nav>

  <main class="auth-wrap">
    <div class="form-card">
      <h1 class="auth-heading">Set a new password</h1>

      <!-- Shown by default while waiting for PASSWORD_RECOVERY event -->
      <div id="waiting-state" class="waiting-state">
        <span class="spinner" role="status" aria-label="Verifying reset link"></span>
        <p>Verifying your reset link&hellip;</p>
      </div>

      <!-- Shown if link is expired or invalid (10s timeout) -->
      <div id="expired-state" class="expired-state" role="alert">
        <p>This link has expired or is invalid.</p>
        <p style="margin-top: 10px;">
          <a href="/forgot-password.html">Request a new reset link</a>
        </p>
      </div>

      <!-- Error for form submission -->
      <div id="global-error" class="form-global-error" role="alert"></div>

      <!-- Shown once PASSWORD_RECOVERY fires -->
      <form id="update-form" novalidate>
        <div class="form-field">
          <label class="form-label" for="new-password">New password</label>
          <input
            class="form-input"
            type="password"
            id="new-password"
            name="new-password"
            autocomplete="new-password"
            placeholder="At least 8 characters"
            minlength="8"
            required
          />
          <span class="form-error" id="password-error" role="alert"></span>
        </div>

        <div class="form-field">
          <label class="form-label" for="confirm-password">Confirm new password</label>
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm-password"
            autocomplete="new-password"
            placeholder="Repeat your new password"
            required
          />
          <span class="form-error" id="confirm-error" role="alert"></span>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          Update password
        </button>
      </form>

      <!-- Shown on successful password update -->
      <div id="success-msg" class="success-msg" role="status">
        <div class="success-icon">&#10003;</div>
        <p><strong>Password updated!</strong></p>
        <p style="margin-top: 8px; color: var(--text-2); font-size: 0.9rem;">
          Redirecting you to log in&hellip;
        </p>
      </div>
    </div>
  </main>

  <script type="module" src="/js/update-password.js"></script>
</body>
</html>
